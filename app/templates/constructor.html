<!-- 
  CONSTRUCTOR.HTML
  Интерфейс конструктора отчетов для администраторов.
  Позволяет создавать новые шаблоны отчетов (ReportTemplate) или редактировать существующие.
  Содержит сложную JS-логику для динамического добавления листов и полей в JSON схему (schema).
-->
{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/constructor.css') }}">
{% endblock %}

{% block content %}
<div class="card col-12 col-xxl-11 mx-auto mb-5 border-0 shadow-sm">
    <div class="card-body p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h4 class="fw-bold text-dark m-0">
                {% if template %}Редактирование формы{% else %}Конструктор структуры формы{% endif %}
            </h4>
            <a href="{{ url_for('admin.dashboard') }}#reportsTab" class="btn btn-outline-secondary btn-sm px-3">Отмена</a>
        </div>

        <div class="row g-3 form-group-bottom-margin">
            <div class="col-md-7">
                <label class="form-label small text-muted">Полное имя отчета</label>
                <textarea id="templateName" class="form-control long-name-field"
                    placeholder="Введите полное наименование..." rows="2">{{ template.name if template else '' }}</textarea>
            </div>

            <div class="col-md-5">
                <label class="form-label small text-muted">Короткое имя отчета</label>
                <input type="text" id="templateShortName" class="form-control" placeholder="" value="{{ template.short_name if template else '' }}">
            </div>
        </div>

        <div class="row g-4 mb-5 pb-4 border-bottom">
            <div class="col-md-6">
                <label class="form-label small fw-bold text-dark">Период отчета</label>
                <input type="text" id="templatePeriod" class="form-control bg-light" autocomplete="off" value="{{ template.period if template else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-dark">Срок сдачи</label>
                <input type="date" id="templateDeadline" class="form-control bg-light" value="{{ template.deadline.strftime('%Y-%m-%d') if template and template.deadline else '' }}">
            </div>
        </div>

        <div class="bg-light p-4 rounded mb-5 border">
            <label class="form-label small fw-bold text-dark mb-3">Предварительное назначение прав доступа:</label>
            <div class="mb-3 pb-3 border-bottom border-2 border-light-subtle">
                <label class="fw-bold text-dark mb-2" style="font-size: 0.9rem;">Назначить целой группе:</label>
                <div class="d-flex flex-wrap gap-3">
                    <div class="form-check">
                        <input class="form-check-input group-cb shadow-sm border-secondary" type="checkbox" value="СПО" id="group-spo-c">
                        <label class="form-check-label" for="group-spo-c">СПО</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input group-cb shadow-sm border-secondary" type="checkbox" value="ВУЗ" id="group-vuz-c">
                        <label class="form-check-label" for="group-vuz-c">ВУЗ</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input group-cb shadow-sm border-secondary" type="checkbox" value="Школы" id="group-school-c">
                        <label class="form-check-label" for="group-school-c">Школы</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input group-cb shadow-sm border-secondary" type="checkbox" value="Работодатели" id="group-emp-c">
                        <label class="form-check-label" for="group-emp-c">Работодатели</label>
                    </div>
                </div>
            </div>
            <div class="form-check mb-3 pb-3 border-bottom border-2 border-light-subtle">
                <input class="form-check-input shadow-sm border-secondary" type="checkbox" id="selectAllConstructor"
                    onchange="toggleSelectAllConstructor(this)">
                <label class="form-check-label fw-bold text-primary-copp w-100 ms-1 cursor-pointer"
                    for="selectAllConstructor">
                    Выбрать всех / Снять выделение
                </label>
            </div>
            <div class="row px-2">
                {% for user in users %}
                <div class="form-check col-md-4 mb-2">
                    <input class="form-check-input user-cb" type="checkbox"
                        value="{{ user.id }}" id="u-cb-{{ user.id }}" {% if template and user in template.assigned_users %}checked{% endif %}>
                    <label class="form-check-label small" for="u-cb-{{ user.id }}">{{ user.username }}</label>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <h5 class="fw-bold text-dark mb-0">Структура отчета</h5>
            <div class="d-flex gap-2">
                <input type="text" id="newSheetTitle" class="form-control form-control-sm w-auto"
                    placeholder="Название листа">
                <button onclick="addSheet()" class="btn btn-sm btn-outline-dark px-3">Добавить лист</button>
            </div>
        </div>

        <div id="sheetsWrapper" class="mb-5"></div>

        <button onclick="saveFullReportTemplate()" class="btn btn-copp w-100 py-3 fw-bold">
            {% if template %}Сохранить изменения{% else %}Сохранить шаблон{% endif %}
        </button>
    </div>
</div>

<script>
    // Функция для галочки "Выбрать всех / Снять выделение"
    function toggleSelectAllConstructor(masterCheckbox) {
        const checkboxes = document.querySelectorAll('.user-cb');
        checkboxes.forEach(cb => {
            cb.checked = masterCheckbox.checked;
        });
    }

    // ==========================================
    // ИСПРАВЛЕНИЕ: УМНАЯ РАСПАКОВКА ДАННЫХ ИЗ БАЗЫ
    // ==========================================
    let rawSchema = {% if template %}{{ template.schema | tojson | safe }}{% else %}[]{% endif %};
    let reportStructure = [];

    // База данных может отдать схему как текст, поэтому мы ее распаковываем (JSON.parse)
    if (typeof rawSchema === 'string') {
        try {
            reportStructure = JSON.parse(rawSchema);
            // Защита от двойной запаковки
            if (typeof reportStructure === 'string') {
                reportStructure = JSON.parse(reportStructure);
            }
        } catch (e) {
            console.error("Ошибка чтения структуры отчета:", e);
            reportStructure = [];
        }
    } else {
        reportStructure = rawSchema || [];
    }
    // ==========================================

    function addSheet() {
        const title = document.getElementById('newSheetTitle').value.trim();
        if (!title) return;
        reportStructure.push({ sheet_title: title, fields: [] });
        document.getElementById('newSheetTitle').value = '';
        renderStructure();
    }

    function removeSheet(sIdx) { 
        reportStructure.splice(sIdx, 1); 
        renderStructure(); 
    }

    function addFieldToSheet(sIdx) {
        const labelInput = document.getElementById(`label-${sIdx}`);
        const typeInput = document.getElementById(`type-${sIdx}`);
        const reqInput = document.getElementById(`req-${sIdx}`);
        const multInput = document.getElementById(`mult-${sIdx}`);
        const hintInput = document.getElementById(`hint-${sIdx}`);
        const label = labelInput.value.trim();
        if (!label) return alert('Заполните заголовок показателя!');

        const name = `s${sIdx}_c${Date.now().toString().slice(-6)}`;
        reportStructure[sIdx].fields.push({ name, label, type: typeInput.value, required: reqInput.checked, is_multiple: multInput.checked, hint: hintInput.value.trim() });
        labelInput.value = '';
        hintInput.value = '';
        multInput.checked = false;
        renderStructure();
    }

    function updateSheetTitle(sIdx, newTitle) {
        if (!newTitle.trim()) {
            alert("Название листа не может быть пустым!");
            renderStructure();
            return;
        }
        reportStructure[sIdx].sheet_title = newTitle.trim();
    }

    function updateFieldLabel(sIdx, fIdx, newLabel) {
        if (!newLabel.trim()) {
            alert("Заголовок не может быть пустым!");
            renderStructure();
            return;
        }
        reportStructure[sIdx].fields[fIdx].label = newLabel.trim();
    }

    function updateFieldType(sIdx, fIdx, newType) {
        reportStructure[sIdx].fields[fIdx].type = newType;
    }

    function updateFieldRequired(sIdx, fIdx, isRequired) {
        reportStructure[sIdx].fields[fIdx].required = isRequired;
    }

    function updateFieldMultiple(sIdx, fIdx, isMultiple) {
        reportStructure[sIdx].fields[fIdx].is_multiple = isMultiple;
    }

    function updateFieldHint(sIdx, fIdx, newHint) {
        reportStructure[sIdx].fields[fIdx].hint = newHint.trim();
    }

    function removeField(sIdx, fIdx) { 
        reportStructure[sIdx].fields.splice(fIdx, 1); 
        renderStructure(); 
    }

    function renderStructure() {
        const container = document.getElementById('sheetsWrapper');
        if (reportStructure.length === 0) { 
            container.innerHTML = '<div class="text-center py-5 text-muted bg-light rounded border small">Добавьте первый лист для начала работы.</div>'; 
            return; 
        }

        container.innerHTML = reportStructure.map((sheet, sIdx) => `
            <div class="card mb-4 border-primary-subtle shadow-sm">
                <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-3 gap-3">
                    <div class="d-flex align-items-center flex-grow-1 gap-2">
                        <span class="fw-bold text-primary-copp text-nowrap">Лист:</span>
                        <input type="text" class="form-control form-control-sm border-light-subtle fw-bold text-primary-copp" value="${String(sheet.sheet_title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/&quot;/g, '&quot;')}" oninput="updateSheetTitle(${sIdx}, this.value)">
                    </div>
                    <button onclick="removeSheet(${sIdx})" class="btn btn-sm btn-outline-danger px-3 border-0 flex-shrink-0">Удалить лист</button>
                </div>
                <div class="card-body">
                    <div class="mb-4">
                        ${sheet.fields.map((f, fIdx) => `
                            <div class="py-3 border-bottom">
                                <div class="d-flex align-items-start gap-3 mb-2">
                                    <span class="text-muted small fw-bold constructor-idx mt-1">${fIdx + 1}.</span>
                                    <textarea class="form-control form-control-sm constructor-textarea border-light-subtle" rows="2" oninput="updateFieldLabel(${sIdx}, ${fIdx}, this.value)">${String(f.label || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                                </div>
                                <div class="d-flex align-items-center gap-3 ms-4 ps-2 mb-2">
                                    <select class="form-select form-select-sm w-auto text-muted" onchange="updateFieldType(${sIdx}, ${fIdx}, this.value)">
                                        <option value="number" ${f.type === 'number' ? 'selected' : ''}>Числовое</option>
                                        <option value="text" ${f.type === 'text' ? 'selected' : ''}>Текстовое</option>
                                    </select>
                                    <div class="form-check mb-0">
                                        <input class="form-check-input" type="checkbox" id="req-${sIdx}-${fIdx}" ${f.required ? 'checked' : ''} onchange="updateFieldRequired(${sIdx}, ${fIdx}, this.checked)">
                                        <label class="form-check-label small text-dark" for="req-${sIdx}-${fIdx}">Обязательно</label>
                                    </div>
                                    <div class="form-check mb-0">
                                        <input class="form-check-input" type="checkbox" id="mult-${sIdx}-${fIdx}" ${f.is_multiple ? 'checked' : ''} onchange="updateFieldMultiple(${sIdx}, ${fIdx}, this.checked)">
                                        <label class="form-check-label small text-dark" for="mult-${sIdx}-${fIdx}">Разрешить несколько значений (+)</label>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center ms-4 ps-2">
                                    <div class="flex-grow-1 me-3">
                                        <textarea class="form-control form-control-sm border-light-subtle text-muted constructor-textarea" rows="2" placeholder="Подсказка для пользователя (необязательно)" oninput="updateFieldHint(${sIdx}, ${fIdx}, this.value)">${String(f.hint || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                                    </div>
                                    <div class="d-flex align-items-center gap-3 flex-shrink-0">
                                        <span class="badge bg-light border text-muted font-monospace constructor-badge">${f.name}</span>
                                        <button onclick="removeField(${sIdx}, ${fIdx})" class="btn btn-sm btn-link text-danger p-0 text-decoration-none fw-bold">Удалить</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-light p-3 rounded border border-light-subtle d-flex flex-column gap-2">
                        <textarea id="label-${sIdx}" class="form-control form-control-sm constructor-textarea" placeholder="Заголовок столбца" rows="3"></textarea>
                        
                        <div class="d-flex align-items-center gap-3">
                            <select id="type-${sIdx}" class="form-select form-select-sm" style="width: 200px;">
                                <option value="number">Числовое</option>
                                <option value="text">Текстовое</option>
                            </select>
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" id="req-${sIdx}" checked>
                                <label class="form-check-label small text-dark" for="req-${sIdx}">Обязательно</label>
                            </div>
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" id="mult-${sIdx}">
                                <label class="form-check-label small text-dark" for="mult-${sIdx}">Несколько значений (+)</label>
                            </div>
                        </div>

                        <div class="d-flex align-items-start gap-2">
                            <textarea id="hint-${sIdx}" class="form-control form-control-sm flex-grow-1 constructor-textarea" rows="2" placeholder="Подсказка (необязательно)"></textarea>
                            <button onclick="addFieldToSheet(${sIdx})" class="btn btn-sm btn-dark px-4 flex-shrink-0 mt-1">Добавить</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function saveFullReportTemplate() {
        let name = document.getElementById('templateName').value.trim();
        name = name.replace(/\r?\n|\r/g, ' '); // Удаляем переносы строк из полного имени
        const shortName = document.getElementById('templateShortName').value.trim();
        const period = document.getElementById('templatePeriod').value.trim();
        const deadline = document.getElementById('templateDeadline').value;
        
        if (!name || !shortName) return alert('Требуется указать наименования отчета.');
        if (reportStructure.length === 0) return alert('Требуется создать хотя бы один лист!');
        
        const userIds = Array.from(document.querySelectorAll('.user-cb:checked')).map(cb => parseInt(cb.value));
        const groupNames = Array.from(document.querySelectorAll('.group-cb:checked')).map(cb => cb.value);
        
        const editTemplateId = {% if template %}{{ template.id }}{% else %}null{% endif %};
        const fetchUrl = editTemplateId ? `/admin/edit_constructor/${editTemplateId}` : "{{ url_for('admin.constructor') }}";

        fetch(fetchUrl, { headers: { 'X-CSRFToken': '{{ csrf_token() }}' }, 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' , 'X-CSRFToken': '{{ csrf_token() }}'}, 
            body: JSON.stringify({ name, short_name: shortName, period, deadline, schema: reportStructure, user_ids: userIds, group_names: groupNames }) 
        })
        .then(res => res.json())
        .then(data => { 
            if (data.status === 'success') {
                window.location.href = "{{ url_for('admin.dashboard') }}#reportsTab"; 
            } 
        })
        .catch(err => {
            console.error("Ошибка при сохранении:", err);
            alert("Произошла ошибка при сохранении. Проверьте консоль.");
        });
    }

    renderStructure();
</script>
{% endblock %}
