<!-- 
  VIEWER_DASHBOARD.HTML
  Панель наблюдателя (министерства).
  Позволяет только просматривать и выгружать отчеты (Read-Only).
-->
{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/viewer.css') }}">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold text-dark m-0">Панель наблюдателя</h3>
        <!-- <p class="text-muted small m-0">Интерфейс аналитического просмотра</p> -->
    </div>
    <!-- <a href="{{ url_for('admin.constructor') }}" class="btn btn-copp px-4">Создать новый отчет</a> -->
</div>

<ul class="nav nav-tabs mb-4" id="viewerTabs" role="tablist">
    <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#monitoringTab" type="button">Мониторинг отчетов</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#futureTab" type="button" tabindex="">Резервная вкладка</button>
    </li>
</ul>

<div class="tab-content">
    
    <div class="tab-pane fade show active" id="monitoringTab" role="tabpanel">
        {% include 'admin_tabs/reports_tabs.html' %}
    </div>

    <div class="tab-pane fade" id="futureTab" role="tabpanel">
        <div class="text-center py-5 text-muted bg-white rounded border">Здесь появится новый функционал.</div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const searchInput = document.getElementById('reportSearch');
        if (searchInput) {
            searchInput.addEventListener('input', function () {
                const query = this.value.toLowerCase();
                const reportItems = document.querySelectorAll('.report-item');

                reportItems.forEach(function (item) {
                    const textContent = item.textContent.toLowerCase();
                    if (textContent.includes(query)) {
                        item.style.display = '';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        }
    });
</script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
{% endblock %}
