<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Панель Администратора - ЦОПП РАС</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <header class="bg-white py-2" style="border-bottom: 1px solid #e2e8f0;">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <a class="brand-container text-decoration-none" href="/"
                style="display: flex; flex-direction: row; align-items: center; gap: 15px;">
                <img src="{{ url_for('static', filename='img/logoblue2.png') }}" alt="Логотип" height="45"
                    style="min-width: 45px; object-fit: contain;">
                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <span class="brand-main lh-1 mb-1" style="font-size: 1.1rem; white-space: nowrap; color: #00334e; font-weight: 900; text-transform: uppercase;">Республики Крым</span>
                    <span class="brand-sub lh-1 text-muted" style="font-size: 0.65rem; white-space: nowrap;">Региональная Аналитическая Система</span>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <div class="d-flex flex-column align-items-end me-4">
                    <span class="navbar-text p-0 small fw-bold text-dark">{{ current_user.username }}</span>
                </div>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-copp btn-sm px-3 text-white">Выйти</a>
            </div>
        </div>
    </header>

    {% block admin_navbar %}{% endblock %}
    
    <div class="container-fluid mt-2 mb-4">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
